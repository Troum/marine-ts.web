# Marine Technical Solutions — Nuxt SSR за nginx
#
# Установка на сервере (пример):
#   sudo cp deploy/nginx/legacy-redirects.map /etc/nginx/maps/marin-ts-legacy-redirects.map
#   sudo cp deploy/nginx/marin-ts.com.conf /etc/nginx/sites-available/marin-ts.com.conf
#   sudo ln -sf /etc/nginx/sites-available/marin-ts.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: certbot --nginx -d marin-ts.com -d www.marin-ts.com
# После выпуска сертификата раскомментируйте блоки listen 443 и пути ssl_certificate*.

# Длинные legacy-пути (/ru/obespechenie-..., /en/completed-projects/...) — иначе:
# could not build map_hash, you should increase map_hash_bucket_size: 64
map_hash_bucket_size 256;

map $uri $legacy_redirect {
    default "";
    include /etc/nginx/maps/marin-ts-legacy-redirects.map;
}

upstream marine_ts_nuxt {
    server 127.0.0.1:3010;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS, любой host → canonical non-www ─────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name marin-ts.com www.marin-ts.com;

    return 301 https://marin-ts.com$request_uri;
}

# ── HTTPS www → non-www ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.marin-ts.com;

    ssl_certificate     /etc/letsencrypt/live/marin-ts.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marin-ts.com/privkey.pem;

    return 301 https://marin-ts.com$request_uri;
}

# ── Основной сайт (HTTPS, без www) ───────────────────────────────────────────
server {
    server_name marin-ts.com;

    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate     /etc/letsencrypt/live/marin-ts.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marin-ts.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10m;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Миграция: 301 со старых URL (таблица редирект301.xlsx) ─
    if ($legacy_redirect != "") {
        return 301 $legacy_redirect;
    }

    # ── Со slash на конце для legacy-путей без slash в map ───
    location = /ru/ { return 301 /; }
    location = /en/ { return 301 /en; }

    # ── robots.txt / sitemap.xml из Nuxt public ────────────────
    location = /robots.txt {
        proxy_pass http://marine_ts_nuxt;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1h;
    }

    location = /sitemap.xml {
        proxy_pass http://marine_ts_nuxt;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1h;
    }

    # ── Static assets from Nuxt build (long-lived cache) ─────
    location /_nuxt/ {
        proxy_pass http://marine_ts_nuxt;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── All other requests → Nuxt SSR ────────────────────────
    location / {
        proxy_pass http://marine_ts_nuxt;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # ── ВРЕМЕННО: сброс кэша/cookies/storage у посетителя ──
        # ВНИМАНИЕ: "cookies" ломает Яндекс.Метрику (сессии/вебвизор). Уберите после миграции.
        add_header Clear-Site-Data "\"cache\", \"cookies\", \"storage\"" always;
        add_header Cache-Control "no-store" always;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/marin-ts.com.access.log;
    error_log  /var/log/nginx/marin-ts.com.error.log;
}
