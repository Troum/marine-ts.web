# Laravel API — api.marin-ts.com
#
# Перед включением сайта:
#   1. В http { } nginx.conf должны быть зоны (ОДИН раз на весь nginx):
#        limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
#        limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
#      Если их ещё нет — см. deploy/nginx/nginx-http-limits.conf.example
#      Не подключайте .example, если зоны уже объявлены (будет "already bound").
#   2. sudo bash deploy/nginx/install-letsencrypt-snippets.sh
#   3. sudo cp deploy/nginx/api.marin-ts.com.conf /etc/nginx/sites-available/api.marin-ts.com.conf
#   4. sudo ln -sf /etc/nginx/sites-available/api.marin-ts.com.conf /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.marin-ts.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.marin-ts.com;
    root /var/www/api.marin-ts.com/public;

    index index.php;
    charset utf-8;

    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/api.marin-ts.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.marin-ts.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; style-src 'self' 'unsafe-inline' https://fonts.bunny.net; style-src-elem 'self' 'unsafe-inline' https://fonts.bunny.net; script-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data: https://fonts.bunny.net; img-src 'self' data: https: blob:; connect-src 'self'; base-uri 'self'; form-action 'self'" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    client_max_body_size 10m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/json;

    if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 444;
    }

    location ~ ^/api/(login|register|forgot-password|reset-password) {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # location /telescope {
    #     deny all;
    #     return 404;
    # }

    location ~ ^/(\.env|artisan|composer\.(json|lock)|package\.json|phpunit\.xml|webpack\.mix\.js|\.git|\.editorconfig|\.styleci\.yml) {
        deny all;
        return 404;
    }

    location ~* ^/storage/(.+)\.(jpe?g|png)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary Accept always;
        access_log off;
        log_not_found off;
        try_files /storage/$1.webp $uri @storage_not_found;
    }

    location ~* ^/storage/(.+)\.webp$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary Accept always;
        access_log off;
        log_not_found off;
        try_files $uri /storage/$1.jpg /storage/$1.jpeg /storage/$1.png @storage_not_found;
    }

    location /storage/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
        log_not_found off;
        try_files $uri @storage_not_found;
    }

    location @storage_not_found {
        return 404;
    }

    location ~ ^/vendor/ {
        deny all;
        return 404;
    }

    location ~ ^/(status|info|ping|health)\.php$ {
        deny all;
        return 404;
    }

    location / {
        limit_req zone=api_general burst=60 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/var/run/php/php8.5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_hide_header X-Powered-By;
        fastcgi_hide_header X-CF-Powered-By;

        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_connect_timeout 5s;
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/api.marin-ts.com.access.log;
    error_log  /var/log/nginx/api.marin-ts.com.error.log;
}
